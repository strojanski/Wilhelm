services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: patients
      POSTGRES_USER: wilhelm
      POSTGRES_PASSWORD: wilhelm_pass
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wilhelm -d patients"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: backend/WilhelmBackend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      APP_BASE_URL: http://app:8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/patients
      SPRING_DATASOURCE_USERNAME: wilhelm
      SPRING_DATASOURCE_PASSWORD: wilhelm_pass
      APP_REPORTS_DIRECTORY: /opt/wilhelm-server/reports
      APP_AI_API_URL: http://vision-api:8000
    volumes:
      - reports:/opt/wilhelm-server/reports

  vision-api:
    build: .
    working_dir: /app/vision
    command: uvicorn vision_api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - app
    volumes:
      - ./vision_segmentation/weights:/app/vision_segmentation/weights:ro
    environment:
      MODEL_ROOT: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  tee-extension:
    build: .
    working_dir: /app/vision
    command: python main.py
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      VISION_API_URL: http://vision-api:8000
      TEE_PRIVATE_KEY: ${PRIVATE_KEY:-}
      EXTENSION_PORT: ${EXTENSION_PORT:-8080}
      SIGN_PORT: ${SIGN_PORT:-9090}
      FRACTURE_THRESHOLD: ${FRACTURE_THRESHOLD:-0.0853}
      # Flare network
      CHAIN_URL: ${CHAIN_URL:-}
      NORMAL_PROXY_URL: ${NORMAL_PROXY_URL:-}
      TUNNEL_URL: ${TUNNEL_URL:-}
      EXTENSION_ID: ${EXTENSION_ID:-}
      INITIAL_OWNER: ${INITIAL_OWNER:-}
      INSTRUCTION_SENDER: ${INSTRUCTION_SENDER:-}
      FEE_WEI: ${FEE_WEI:-}
      LOCAL_MODE: ${LOCAL_MODE:-false}
    depends_on:
      - vision-api

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    env_file:
      - gemma/.env
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_FLASH_ATTENTION=1
    expose:
      - "11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - gemma/.env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling model: $$LLM_MODEL"
        ollama pull "$$LLM_MODEL"
        echo "Model ready."
    restart: "no"

  ollama-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "${PROXY_PORT:-8084}:8080"
    env_file:
      - gemma/.env
    volumes:
      - ./gemma/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  llm-api:
    build:
      context: llm_api
      dockerfile: Dockerfile
    image: gemma-api:latest
    container_name: gemma-api
    env_file:
      - llm_api/.env
    ports:
      - "8082:8080"
    restart: unless-stopped
    depends_on:
      - ollama-proxy

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8081/api
      VITE_LLM_URL: http://localhost:8082
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - app
      - llm-api


volumes:
  db_data:
  reports:
  frontend_node_modules:
  ollama_data:
  caddy_data:
  caddy_config:
