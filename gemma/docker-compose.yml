services:
  # ---- Ollama: GPU-accelerated model server (internal only) -----------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-16384}
      - OLLAMA_FLASH_ATTENTION=1
    # No host port published — only the proxy can reach it.
    expose:
      - "11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---- Model puller: one-shot, pulls the model named in .env ----------------
  model-init:
    image: ollama/ollama:latest
    container_name: ollama-model-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling model: $$LLM_MODEL"
        ollama pull "$$LLM_MODEL"
        echo "Model ready."
    restart: "no"

  # ---- Caddy: API-key auth + OpenAI-compatible passthrough ------------------
  proxy:
    image: caddy:2-alpine
    container_name: ollama-proxy
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "${PROXY_PORT:-8084}:8080"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  ollama_data:
  caddy_data:
  caddy_config:
